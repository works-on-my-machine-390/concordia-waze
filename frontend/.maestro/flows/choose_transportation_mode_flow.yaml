appId: host.exp.Exponent
---
# 1) Continue as guest (bypass authentication and enter the app)
- tapOn: "Use without account"

# 2) Wait for the map screen to be ready (SGW campus label visible)
- extendedWaitUntil:
    visible: "SGW"
    timeout: 8000

# 3) Tap the main search bar ("Where to...") to start a destination search
- tapOn:
    text: ".*Where to.*"

# 4) Search for ER and wait for the specific suggestion/result to appear
- inputText: "ER"
- extendedWaitUntil:
    visible: "ER - ER Building"
    timeout: 8000

# 5) Select the "ER - ER Building" result (double-tap to ensure it is selected/opened)
- tapOn: ER - ER Building
- tapOn: ER - ER Building

# 6) Confirm the ER building details/bottom sheet is visible
- extendedWaitUntil:
    visible:
      text: ".*ER Building.*"
    timeout: 8000

# 7) Tap the directions/navigation entry point (this is an icon-only control in the UI)
# NOTE: Recorded by Studio as "Open map settings" (represents the maroon directions icon area)
- tapOn: Open map settings

- tapOn: 4 mins

- tapOn: , 4 mins

- tapOn:
    text: 1 min
    index: 1

# 8) Expand the route bottom sheet by swiping up from the mode selector area
# (Anchor is either "Bike" or "Drive" depending on which mode label is visible)
- swipe:
    from:
      text: "^(Bike|Drive)$"
    direction: UP
    duration: 250

- tapOn: "4 mins"
- tapOn: ", 4 mins"
- tapOn:
    text: "1 min"
    index: 1

# 9) Exit/close navigation using the close button testID
- tapOn:
    id: close-navigation