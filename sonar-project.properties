sonar.projectKey=works-on-my-machine-390_concordia-waze
sonar.organization=works-on-my-machine


# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=concordia-waze
#sonar.projectVersion=1.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=frontend/app,frontend/components,frontend/hooks,backend

# Coverage report paths (for JavaScript/TypeScript)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions (don't analyze test files, coverage reports, build outputs)
sonar.exclusions=**/node_modules/**,**/coverage/**,**/tmp/**,**/*.test.ts,**/*.test.tsx

# For Go coverage (backend tests)
sonar.go.coverage.reportPaths=backend/coverage.out

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8