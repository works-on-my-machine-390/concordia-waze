name: Backend CI

on:
  push:
    branches: [main, dev]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: ["1.25.5"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Java (for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Download dependencies
        run: cd backend && go mod download

      - name: Set up Firebase Emulator
        run: |
          npm install -g firebase-tools
          firebase emulators:start --only firestore --project demo-test &
          sleep 15
          curl -s http://127.0.0.1:8080 || echo "Emulator starting..."

      - name: Run tests
        env:
          FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"
          GCLOUD_PROJECT: "demo-test-project"
        run: cd backend && go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Run go vet
        run: cd backend && go vet ./...

      - name: Run go fmt check
        run: cd backend && test -z "$(go fmt ./...)"

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.5"

      - name: Build
        run: cd backend && go build -v -o bin/api main.go

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-binary
          path: backend/bin/api
          retention-days: 5
