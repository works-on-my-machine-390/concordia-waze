name: Code Quality
on:
  push:
    branches:
      - dev
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/code-quality.yml"
  pull_request:
    branches: [main, dev]
    types: [opened, synchronize, reopened]
    paths:
      - "backend/**"
      - "frontend/**"
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up Bun
        uses: oven-sh/setup-bun@v1

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.25.5"

      - name: Set up Java (for Firebase Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Generate frontend coverage
        run: |
          cd frontend
          bun install
          npm test -- --coverage

      - name: Set up Firebase Emulator
        run: |
          npm install -g firebase-tools
          cat > firebase.json <<EOF
          {
            "emulators": {
              "firestore": {
                "port": 8080
              }
            }
          }
          EOF
          firebase emulators:start --only firestore --project demo-test > emulator.log 2>&1 &
          EMULATOR_PID=$!
          echo "Waiting for emulator to start (PID: $EMULATOR_PID)..."
          for i in {1..45}; do
            if curl -s http://127.0.0.1:8080 > /dev/null 2>&1; then
              echo "Emulator started successfully"
              break
            fi
            if [ $i -eq 45 ]; then
              echo "Emulator failed to start. Log:"
              cat emulator.log
              exit 1
            fi
            sleep 2
          done

      - name: Generate backend coverage
        env:
          FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"
          GCLOUD_PROJECT: "demo-test-project"
        run: |
          cd backend
          go test -v -coverprofile=coverage.out ./internal/...
          sed -i 's|github.com/works-on-my-machine-390/concordia-waze/|backend/|g' coverage.out

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
