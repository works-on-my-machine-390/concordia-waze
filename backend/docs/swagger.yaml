definitions:
  application.DestinationHistoryItem:
    properties:
      address:
        type: string
      buildingCode:
        type: string
      destinationType:
        description: '"building" or "poi"'
        type: string
      historyId:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      placeId:
        type: string
      timestamp:
        type: string
    type: object
  application.FloorSegment:
    properties:
      directions:
        items:
          $ref: '#/definitions/application.TurnDirection'
        type: array
      distance:
        type: number
      floorName:
        type: string
      floorNumber:
        type: integer
      path:
        items:
          $ref: '#/definitions/domain.Coordinates'
        type: array
    type: object
  application.MultiFloorPathRequest:
    properties:
      buildingCode:
        type: string
      end:
        $ref: '#/definitions/domain.Coordinates'
      endFloor:
        type: integer
      endRoom:
        type: string
      preferElevator:
        type: boolean
      requireAccessible:
        description: filter out inaccessible edges
        type: boolean
      start:
        $ref: '#/definitions/domain.Coordinates'
      startFloor:
        type: integer
      startRoom:
        type: string
    type: object
  application.MultiFloorPathResult:
    properties:
      segments:
        items:
          $ref: '#/definitions/application.FloorSegment'
        type: array
      totalDistance:
        type: number
      transitionType:
        $ref: '#/definitions/application.TransitionType'
    type: object
  application.SavedAddress:
    properties:
      address:
        type: string
      addressId:
        type: string
    type: object
  application.ScheduleItem:
    properties:
      building:
        type: string
      daysOfWeek:
        items:
          type: string
        type: array
      endTime:
        type: string
      name:
        type: string
      room:
        type: string
      scheduleId:
        type: string
      startTime:
        type: string
      type:
        type: string
    type: object
  application.TransitionType:
    enum:
    - 0
    - 1
    - 2
    type: integer
    x-enum-varnames:
    - TransitionNone
    - TransitionStairs
    - TransitionElevator
  application.TurnDirection:
    enum:
    - left
    - right
    - straight
    type: string
    x-enum-varnames:
    - TurnLeft
    - TurnRight
    - TurnStraight
  domain.Building:
    properties:
      accessibility:
        items:
          type: string
        type: array
      address:
        type: string
      code:
        type: string
      departments:
        items:
          type: string
        type: array
      latitude:
        type: number
      long_name:
        type: string
      longitude:
        type: number
      metro_accessible:
        type: boolean
      name:
        type: string
      opening_hours:
        $ref: '#/definitions/domain.OpeningHours'
      services:
        items:
          type: string
        type: array
      venues:
        items:
          type: string
        type: array
    type: object
  domain.BuildingPolygon:
    properties:
      code:
        type: string
      polygon:
        items:
          $ref: '#/definitions/domain.LatLng'
        type: array
    type: object
  domain.BuildingSummary:
    properties:
      address:
        type: string
      campus:
        description: '"SGW" or "LOY"'
        type: string
      code:
        type: string
      latitude:
        type: number
      long_name:
        type: string
      longitude:
        type: number
      name:
        type: string
    type: object
  domain.CampusBuildingsResponse:
    properties:
      buildings:
        items:
          $ref: '#/definitions/domain.BuildingPolygon'
        type: array
      campus:
        type: string
    type: object
  domain.Coordinates:
    properties:
      x:
        type: number
      "y":
        type: number
    type: object
  domain.DayHours:
    properties:
      close:
        type: string
      open:
        type: string
    type: object
  domain.DirectionStep:
    properties:
      arrival_stop:
        type: string
      arrival_time:
        type: string
      departure_stop:
        type: string
      departure_time:
        type: string
      distance:
        type: string
      duration:
        type: string
      end:
        $ref: '#/definitions/domain.LatLng'
      instruction:
        type: string
      maneuver:
        type: string
      num_stops:
        type: integer
      polyline:
        type: string
      start:
        $ref: '#/definitions/domain.LatLng'
      transit_headsign:
        type: string
      transit_line:
        type: string
      transit_line_color:
        type: string
      transit_line_text_color:
        type: string
      transit_type:
        type: string
      travel_mode:
        type: string
    type: object
  domain.DirectionsResponse:
    properties:
      departure_message:
        type: string
      distance:
        type: string
      duration:
        type: string
      mode:
        type: string
      polyline:
        type: string
      steps:
        items:
          $ref: '#/definitions/domain.DirectionStep'
        type: array
    type: object
  domain.Edge:
    properties:
      endVertex:
        type: integer
      startVertex:
        type: integer
    type: object
  domain.Floor:
    properties:
      edges:
        items:
          $ref: '#/definitions/domain.Edge'
        type: array
      imgPath:
        type: string
      name:
        type: string
      number:
        type: integer
      pois:
        items:
          $ref: '#/definitions/domain.PointOfInterest'
        type: array
      vertices:
        items:
          $ref: '#/definitions/domain.Coordinates'
        type: array
    type: object
  domain.LatLng:
    properties:
      latitude:
        type: number
      longitude:
        type: number
    type: object
  domain.OpeningHours:
    additionalProperties:
      $ref: '#/definitions/domain.DayHours'
    type: object
  domain.PointOfInterest:
    properties:
      name:
        type: string
      polygon:
        items:
          $ref: '#/definitions/domain.Coordinates'
        type: array
      position:
        $ref: '#/definitions/domain.Coordinates'
      type:
        type: string
    type: object
  domain.User:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  handler.AuthResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  handler.AuthURLResponse:
    properties:
      url:
        type: string
    type: object
  handler.BuildingImagesResponse:
    properties:
      building_code:
        type: string
      images:
        items:
          type: string
        type: array
    type: object
  handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.SignUpRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
  handler.StatusOKResponse:
    properties:
      ok:
        type: boolean
    type: object
  handler.TokenSaveResponse:
    properties:
      message:
        type: string
      ok:
        type: boolean
      userId:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the Concordia Waze API server.
  title: Concordia Waze API
  version: "1.0"
paths:
  /auth/google:
    get:
      consumes:
      - application/json
      description: 'Checks stored Google tokens for the authenticated user and returns
        either a short-lived auth URL (when re-auth is required) or {"ok": true} when
        the token is usable. This endpoint SHOULD be called by an authenticated user
        (server-side JWT). The handler will use the server-side user ID from the auth
        context (do not rely on query userId in production).'
      parameters:
      - description: Optional fallback userId if not available in auth context
        in: query
        name: userId
        type: string
      - default: Bearer <token>
        description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: No valid token; frontend should redirect user to this URL
          schema:
            $ref: '#/definitions/handler.AuthURLResponse'
        "400":
          description: Missing userId or invalid request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Server error checking token or generating URL
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get Google OAuth2 status / auth URL
      tags:
      - auth
  /auth/google/callback:
    get:
      consumes:
      - application/json
      description: Callback endpoint invoked by Google after user consent. Exchanges
        the authorization code for tokens and persists them on the server. The `state`
        parameter must be a signed short-lived token previously returned to the frontend
        by GetAuthStatus (contains the userId). This endpoint is public (called by
        Google) and must validate the signed state.
      parameters:
      - description: Authorization code returned by Google
        in: query
        name: code
        required: true
        type: string
      - description: Signed state token issued by backend (contains userId and short
          expiry)
        in: query
        name: state
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Tokens saved on server
          schema:
            $ref: '#/definitions/handler.TokenSaveResponse'
        "302":
          description: Redirect to configured frontend success URL
          schema:
            type: string
        "400":
          description: Missing or invalid code/state
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Failed to exchange code or save token
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Google OAuth2 callback
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password, receive JWT token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the authenticated user and revoke their token
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/profile:
    get:
      consumes:
      - application/json
      description: Get the authenticated user's information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "401":
          description: Not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account with name, email, and password
      parameters:
      - description: Sign up details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.SignUpRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: User already exists
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /buildings/{code}:
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific building by its code
      parameters:
      - description: Building code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Building'
        "404":
          description: building not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get building by code
      tags:
      - buildings
  /buildings/{code}/images:
    get:
      consumes:
      - application/json
      description: Get images for a specific building by its code from Google Places
        API
      parameters:
      - description: Building code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.BuildingImagesResponse'
        "404":
          description: building not found or no images available
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get building images
      tags:
      - buildings
  /buildings/floor/{code}:
    get:
      consumes:
      - application/json
      description: |-
        {
        "floors": {
        { "name": "...", "imgPath": "...", "vertices": [...], "edge": [...], "poi": [...] },
        { ... }
        }
        }
      parameters:
      - description: Building code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              items:
                $ref: '#/definitions/domain.Floor'
              type: array
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: return all building floors for a specific building code
      tags:
      - buildings
  /buildings/list:
    get:
      consumes:
      - application/json
      description: |-
        Return all building codes, names and long names grouped by campus. Response shape:
        {
        "buildings": {
        "SGW": [ { "code": "...", "name": "...", "long_name": "...", "campus": "SGW" }, ... ],
        "LOY": [ ... ]
        }
        }
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              additionalProperties:
                items:
                  $ref: '#/definitions/domain.BuildingSummary'
                type: array
              type: object
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List all buildings grouped by campus
      tags:
      - buildings
  /campuses/{campus}/buildings:
    get:
      consumes:
      - application/json
      description: Return all building codes and names for a given campus (e.g. "SGW"
        or "LOY").
      parameters:
      - description: Campus code (SGW or LOY)
        in: path
        name: campus
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.CampusBuildingsResponse'
        "404":
          description: campus not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: List buildings for a campus
      tags:
      - buildings
  /directions:
    get:
      description: Returns route polyline + step instructions (walking/driving/transit/shuttle/bicycling)
      parameters:
      - description: Start latitude
        in: query
        name: start_lat
        required: true
        type: number
      - description: Start longitude
        in: query
        name: start_lng
        required: true
        type: number
      - description: End latitude
        in: query
        name: end_lat
        required: true
        type: number
      - description: End longitude
        in: query
        name: end_lng
        required: true
        type: number
      - description: Mode (walking, driving, transit, shuttle, bicycling)
        in: query
        name: mode
        type: string
      - description: Optional day for shuttle (monday..sunday) - automatic
        in: query
        name: day
        type: string
      - description: Optional time for shuttle (HH:MM 24h) - automatic
        in: query
        name: time
        type: string
      - description: Manual shuttle day (monday..sunday) - manual departure selection
        in: query
        name: shuttle_day
        type: string
      - description: Manual shuttle time (HH:MM 24h) - must exist in schedule
        in: query
        name: shuttle_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.DirectionsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get directions between coordinates
      tags:
      - directions
  /directions/buildings:
    get:
      description: Uses building coordinates as origin/destination
      parameters:
      - description: Start building code
        in: query
        name: start_code
        required: true
        type: string
      - description: End building code
        in: query
        name: end_code
        required: true
        type: string
      - description: Mode (walking, driving, transit, shuttle, bicycling)
        in: query
        name: mode
        type: string
      - description: Optional day for shuttle (monday..sunday) - automatic
        in: query
        name: day
        type: string
      - description: Optional time for shuttle (HH:MM 24h) - automatic
        in: query
        name: time
        type: string
      - description: Manual shuttle day (monday..sunday) - manual departure selection
        in: query
        name: shuttle_day
        type: string
      - description: Manual shuttle time (HH:MM 24h) - must exist in schedule
        in: query
        name: shuttle_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.DirectionsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get directions by building codes
      tags:
      - directions
  /directions/indoor/multi-floor-path:
    post:
      consumes:
      - application/json
      description: Returns shortest path from a point on one floor to a point on another
        floor (or same floor). Supports room names or raw coordinates. Uses stairs
        by default, set preferElevator=true for elevator.
      parameters:
      - description: Path request with building, floors, and start/end points
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/application.MultiFloorPathRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/application.MultiFloorPathResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get indoor path across floors
      tags:
      - directions
  /images/{path}:
    get:
      consumes:
      - application/json
      description: SWAGGER DOES NOT WORK SINCE THE PATH HAS '/' . Get images for a
        path from the backend resource directory
      parameters:
      - description: Image path
        in: path
        name: path
        required: true
        type: string
      produces:
      - image/png
      responses:
        "404":
          description: path not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get image from path
      tags:
      - utilityd
  /pointofinterest:
    get:
      consumes:
      - application/json
      description: Get nearby points of interest via text search from Google Places
        API
      parameters:
      - description: Search query (e.g., 'coffee shop')
        in: query
        name: input
        required: true
        type: string
      - description: Latitude of the location
        in: query
        name: lat
        required: true
        type: number
      - description: Longitude of the location
        in: query
        name: lng
        required: true
        type: number
      - description: 'Maximum distance in meters (default: 1000)'
        in: query
        name: max_distance
        type: integer
      - description: 'Rank preference (e.g., ''DISTANCE'', ''RELEVANCE''; default:
          ''DISTANCE'')'
        in: query
        name: rank_preference
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/domain.Building'
            type: array
        "400":
          description: bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get nearby points of interest
      tags:
      - point of interest
  /pointofinterest/indoor:
    get:
      description: Returns indoor POIs near a given indoor position (projected coords).
      parameters:
      - description: Building code (e.g., MB, LB, CC, VL)
        in: query
        name: building
        required: true
        type: string
      - description: Floor number
        in: query
        name: floor
        required: true
        type: integer
      - description: Indoor X coordinate (EPSG:32198 meters)
        in: query
        name: x
        required: true
        type: number
      - description: Indoor Y coordinate (EPSG:32198 meters)
        in: query
        name: "y"
        required: true
        type: number
      - description: 'Radius in meters (default: 40)'
        in: query
        name: radius
        type: integer
      - description: 'Filter to same floor (default: true)'
        in: query
        name: sameFloor
        type: boolean
      - description: 'Max results (default: 30)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: bad request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get nearby indoor POIs
      tags:
      - point of interest
  /rooms/search:
    get:
      description: Returns room centroid coordinates by room number (EPSG:32198)
      parameters:
      - description: Building code (MB, LB, CC, VL)
        in: query
        name: building
        required: true
        type: string
      - description: Room name/number (e.g., S2.285)
        in: query
        name: room
        required: true
        type: string
      - description: Floor (optional; if provided, only searches that floor)
        in: query
        name: floor
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Search a room by number
      tags:
      - rooms
  /shuttle:
    get:
      consumes:
      - application/json
      description: 'Returns the entire shuttle schedule as a mapping: day -> campus
        -> list of times.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              additionalProperties:
                items:
                  type: string
                type: array
              type: object
            type: object
        "500":
