definitions:
  application.DestinationHistoryItem:
    properties:
      address:
        type: string
      buildingCode:
        type: string
      destinationType:
        description: '"building" or "poi"'
        type: string
      historyId:
        type: string
      lat:
        type: number
      lng:
        type: number
      name:
        type: string
      placeId:
        type: string
      timestamp:
        type: string
    type: object
  application.SavedAddress:
    properties:
      address:
        type: string
      addressId:
        type: string
    type: object
  application.ScheduleItem:
    properties:
      building:
        type: string
      daysOfWeek:
        items:
          type: string
        type: array
      endTime:
        type: string
      name:
        type: string
      room:
        type: string
      scheduleId:
        type: string
      startTime:
        type: string
      type:
        type: string
    type: object
  domain.Building:
    properties:
      accessibility:
        items:
          type: string
        type: array
      address:
        type: string
      code:
        type: string
      departments:
        items:
          type: string
        type: array
      latitude:
        type: number
      long_name:
        type: string
      longitude:
        type: number
      metro_accessible:
        type: boolean
      name:
        type: string
      opening_hours:
        $ref: '#/definitions/domain.OpeningHours'
      services:
        items:
          type: string
        type: array
      venues:
        items:
          type: string
        type: array
    type: object
  domain.DayHours:
    properties:
      close:
        type: string
      open:
        type: string
    type: object
  domain.DirectionStep:
    properties:
      distance:
        type: string
      duration:
        type: string
      end:
        $ref: '#/definitions/domain.LatLng'
      instruction:
        type: string
      start:
        $ref: '#/definitions/domain.LatLng'
    type: object
  domain.DirectionsResponse:
    properties:
      departure_message:
        type: string
      mode:
        type: string
      polyline:
        items:
          $ref: '#/definitions/domain.LatLng'
        type: array
      steps:
        items:
          $ref: '#/definitions/domain.DirectionStep'
        type: array
    type: object
  domain.LatLng:
    properties:
      latitude:
        type: number
      longitude:
        type: number
    type: object
  domain.OpeningHours:
    additionalProperties:
      $ref: '#/definitions/domain.DayHours'
    type: object
  domain.User:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
    type: object
  handler.AuthResponse:
    properties:
      email:
        type: string
      id:
        type: string
      name:
        type: string
      token:
        type: string
    type: object
  handler.BuildingImagesResponse:
    properties:
      building_code:
        type: string
      images:
        items:
          type: string
        type: array
    type: object
  handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.SignUpRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - name
    - password
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the Concordia Waze API server.
  title: Concordia Waze API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate a user with email and password, receive JWT token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the authenticated user and revoke their token
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /auth/profile:
    get:
      consumes:
      - application/json
      description: Get the authenticated user's information
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "401":
          description: Not authenticated
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account with name, email, and password
      parameters:
      - description: Sign up details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.SignUpRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "400":
          description: Validation error
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: User already exists
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - auth
  /buildings/{code}:
    get:
      consumes:
      - application/json
      description: Get detailed information about a specific building by its code
      parameters:
      - description: Building code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.Building'
        "404":
          description: building not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get building by code
      tags:
      - buildings
  /buildings/{code}/images:
    get:
      consumes:
      - application/json
      description: Get images for a specific building by its code from Google Places
        API
      parameters:
      - description: Building code
        in: path
        name: code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.BuildingImagesResponse'
        "404":
          description: building not found or no images available
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get building images
      tags:
      - buildings
  /directions:
    get:
      description: Returns route polyline + step instructions (walking/driving/transit/shuttle)
      parameters:
      - description: Start latitude
        in: query
        name: start_lat
        required: true
        type: number
      - description: Start longitude
        in: query
        name: start_lng
        required: true
        type: number
      - description: End latitude
        in: query
        name: end_lat
        required: true
        type: number
      - description: End longitude
        in: query
        name: end_lng
        required: true
        type: number
      - description: Mode (walking, driving, transit, shuttle)
        in: query
        name: mode
        type: string
      - description: Optional day for shuttle (monday..sunday) - automatic
        in: query
        name: day
        type: string
      - description: Optional time for shuttle (HH:MM 24h) - automatic
        in: query
        name: time
        type: string
      - description: Manual shuttle day (monday..sunday) - manual departure selection
        in: query
        name: shuttle_day
        type: string
      - description: Manual shuttle time (HH:MM 24h) - must exist in schedule
        in: query
        name: shuttle_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.DirectionsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get directions between coordinates
      tags:
      - directions
  /directions/buildings:
    get:
      description: Uses building coordinates as origin/destination
      parameters:
      - description: Start building code
        in: query
        name: start_code
        required: true
        type: string
      - description: End building code
        in: query
        name: end_code
        required: true
        type: string
      - description: Mode (walking, driving, transit, shuttle)
        in: query
        name: mode
        type: string
      - description: Optional day for shuttle (monday..sunday) - automatic
        in: query
        name: day
        type: string
      - description: Optional time for shuttle (HH:MM 24h) - automatic
        in: query
        name: time
        type: string
      - description: Manual shuttle day (monday..sunday) - manual departure selection
        in: query
        name: shuttle_day
        type: string
      - description: Manual shuttle time (HH:MM 24h) - must exist in schedule
        in: query
        name: shuttle_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/domain.DirectionsResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get directions by building codes
      tags:
      - directions
  /shuttle:
    get:
      consumes:
      - application/json
      description: 'Returns the entire shuttle schedule as a mapping: day -> campus
        -> list of times.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              additionalProperties:
                items:
                  type: string
                type: array
              type: object
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get full shuttle schedule
      tags:
      - shuttle
  /shuttle/{day}/{campus_code}:
    get:
      consumes:
      - application/json
      description: Returns a list of departure times (HH:MM strings) for the specified
        campus and day.
      parameters:
      - description: Day of week (e.g., monday)
        in: path
        name: day
        required: true
        type: string
      - description: Campus code (LOY or SGW)
        in: path
        name: campus_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
        "404":
          description: not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get shuttle departures for a campus on a given day
      tags:
      - shuttle
  /users/{userId}/history:
    delete:
      description: Delete all destination history items for a user (keeps _init placeholder)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Clear destination history
      tags:
      - history
    get:
      description: Get a user's past destinations history (latest first)
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - default: 50
        description: Limit results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/application.DestinationHistoryItem'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get destination history
      tags:
      - history
    post:
      consumes:
      - application/json
      description: Add a destination to a user's past destinations history
      parameters:
      - description: Bearer token
        in: header
        name: Authorization
        required: true
        type: string
      - description: User ID
        in: path
        name: userId
        required: true
        type: string
      - description: Destination history item
        in: body
        name: item
        required: true
        schema:
          $ref: '#/definitions/application.DestinationHistoryItem'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Add destination history
      tags:
      - history
  /users/{userId}/profile:
